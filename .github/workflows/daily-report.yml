name: Supplement Research Daily Report

on:
  schedule:
    - cron: "15 3 * * *" # UTC 03:15 = GMT+8 11:15
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: Check existing summaries
        id: check
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          if [ -f "docs/supplement-${TARGET}.html" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Report for ${TARGET} already exists, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch papers from PubMed
        if: steps.check.outputs.skip == 'false'
        id: fetch
        run: |
          node scripts/fetch-papers.mjs \
            --lookback-days 7 \
            --max-papers 50 \
            --output papers.json \
            --today "${{ steps.date.outputs.target }}"
        continue-on-error: true

      - name: Check papers data
        id: papers
        if: steps.check.outputs.skip == 'false'
        run: |
          if [ -f "papers.json" ] && grep -q '"count"' papers.json; then
            COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('papers.json','utf-8')); console.log(d.count||0)")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "{\"date\":\"${{ steps.date.outputs.target }}\",\"count\":0,\"papers\":[]}" > papers.json
          fi

      - name: Generate report with Zhipu AI
        if: steps.check.outputs.skip == 'false'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate-report.mjs \
            --input papers.json \
            --output "docs/supplement-${{ steps.date.outputs.target }}.html"

      - name: Generate index page
        if: steps.check.outputs.skip == 'false'
        run: node scripts/generate-index.mjs

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "supplement daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        if: always()
        run: |
          echo "### Supplement Research Daily Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date:** ${{ steps.date.outputs.target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count || '0' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Report:** [supplement-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/supplement-research/supplement-${{ steps.date.outputs.target }}.html)" >> "$GITHUB_STEP_SUMMARY"
